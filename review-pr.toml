description = "Respond to PR review comments — evaluate, apply/reject, reply, react, resolve"

[prompt]
text = """
You are responding to review comments on a GitHub PR. Follow this workflow exactly.

## Input

- Argument may contain a PR number. If empty, detect from current branch with `gh pr view --json number --jq .number`.
- Read the repository's AGENTS.md if it exists — it may contain project-specific review policies that override defaults below.

## Step 1: Collect unresolved review threads

Use `gh api graphql` to fetch all review threads for the PR. Filter to isResolved == false threads only. If none exist, report "No unresolved review threads" and stop.

## Step 2: Evaluate each comment

For each unresolved thread, read the referenced file and surrounding code. Then decide:

### Apply when:
- Correctness: the comment identifies a real bug, crash, or logic error
- Security: the comment identifies a vulnerability (path traversal, injection, crashes from untrusted input)
- Contract violation: the change breaks a documented interface, API, or behavioral contract

### Reject when:
- Style preference: the suggestion is cosmetic or subjective without clear benefit
- Infeasible: the fix is impossible given architectural constraints
- Out of scope: the issue exists but is unrelated to this PR's changes
- Incorrect analysis: the reviewer's understanding of the code is wrong

## Step 3: Apply fixes (if any)

For each "Apply" decision: make the code change and run lint/typecheck to verify. Batch all fixes — do NOT commit until the end.

## Step 4: Reply to each thread

Post a reply to each comment:
- If Applied: "**Applied.** <explanation>"
- If Rejected: "**Rejected.** <explanation>"

Use: gh api --method POST repos/{owner}/{repo}/pulls/{pr}/comments/{comment_id}/replies -f body="<reply>"

## Step 5: React with usefulness feedback

React to the original bot comment:
- Applied → thumbs up (+1)
- Rejected but valid concern → thumbs up (+1)
- Rejected, wrong analysis → thumbs down (-1)

Use: gh api --method POST repos/{owner}/{repo}/pulls/comments/{comment_id}/reactions -f content="+1" or "-1"

## Step 6: Resolve threads

After replying, resolve each thread via GraphQL mutation resolveReviewThread.

## Step 7: Commit and push

If any code changes were made, stage specific files, commit with a descriptive message, and push.

## Step 8: Summary

Print a summary table with columns: #, File, Priority, Decision, Reaction. Report totals.
"""
